<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>香港中文大学地图</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #15201d;
      --muted: #60706b;
      --panel: rgba(255, 255, 255, 0.94);
      --line: rgba(28, 47, 41, 0.14);
      --road: #d17738;
      --primary-road: #ba3f32;
      --point: #236eb6;
      --park: #6e9b4d;
      --water: #3c8ca8;
      --boundary: #111a18;
      --bg: #edf0ec;
      --bg2: #dde7df;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 58px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(16px);
      z-index: 3;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 720;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px 12px;
      color: var(--muted);
      font-size: 12px;
    }

    main {
      position: relative;
      min-width: 0;
      min-height: 0;
      background:
        linear-gradient(90deg, rgba(21, 32, 29, 0.04) 1px, transparent 1px),
        linear-gradient(rgba(21, 32, 29, 0.04) 1px, transparent 1px),
        linear-gradient(135deg, var(--bg), var(--bg2));
      background-size: 36px 36px, 36px 36px, auto;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }

    canvas.dragging {
      cursor: grabbing;
    }

    .toolbar,
    .layers,
    .legend,
    .details {
      position: absolute;
      z-index: 2;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(13, 24, 21, 0.12);
      backdrop-filter: blur(16px);
    }

    .toolbar {
      top: 14px;
      left: 14px;
      display: grid;
      grid-template-columns: repeat(3, 38px);
      gap: 6px;
      padding: 6px;
      border-radius: 8px;
    }

    button {
      width: 38px;
      height: 34px;
      border: 1px solid rgba(21, 32, 29, 0.14);
      border-radius: 7px;
      background: #ffffff;
      color: var(--ink);
      font-size: 19px;
      line-height: 1;
      cursor: pointer;
    }

    button:hover {
      border-color: rgba(21, 32, 29, 0.28);
      background: #f6f8f6;
    }

    .layers {
      top: 14px;
      right: 14px;
      display: grid;
      gap: 9px;
      width: min(280px, calc(100vw - 28px));
      max-height: min(58vh, 430px);
      overflow: auto;
      padding: 12px;
      border-radius: 8px;
    }

    label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 26px;
      font-size: 13px;
      color: var(--ink);
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #236eb6;
    }

    .layer-divider {
      padding-top: 5px;
      border-top: 1px solid var(--line);
      color: var(--ink);
      font-size: 11px;
      font-weight: 700;
    }

    .category-layers {
      display: grid;
      gap: 8px;
    }

    .category-layers label > span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .legend {
      left: 14px;
      bottom: 14px;
      display: grid;
      gap: 8px;
      width: min(230px, calc(100vw - 28px));
      max-height: min(54vh, 420px);
      overflow: auto;
      padding: 11px 12px;
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .legend-row {
      display: grid;
      grid-template-columns: 26px 1fr;
      align-items: center;
      gap: 8px;
      min-height: 18px;
    }

    .sample {
      width: 26px;
      height: 0;
      border-top: 3px solid var(--road);
    }

    .sample.primary {
      border-top-width: 4px;
      border-top-color: var(--primary-road);
    }

    .sample.boundary {
      border-top: 2px dashed var(--boundary);
    }

    .sample.point {
      width: 10px;
      height: 10px;
      margin-left: 8px;
      border: 0;
      border-radius: 50%;
      background: var(--point);
    }

    .legend-divider {
      padding-top: 4px;
      border-top: 1px solid var(--line);
      color: var(--ink);
      font-size: 11px;
      font-weight: 700;
    }

    #poiLegend {
      display: grid;
      gap: 7px;
    }

    .poi-symbol {
      display: inline-grid;
      place-items: center;
      width: 16px;
      height: 16px;
      color: currentColor;
      font-size: 14px;
      font-weight: 800;
      line-height: 1;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .mini-symbol {
      display: inline-grid;
      place-items: center;
      width: 15px;
      height: 15px;
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
    }

    .legend-name {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .details {
      right: 14px;
      bottom: 14px;
      width: min(340px, calc(100vw - 28px));
      max-height: min(36vh, 260px);
      overflow: auto;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
    }

    .details strong {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--ink);
    }

    .details dl {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 5px 10px;
      margin: 0;
    }

    .details dt {
      color: var(--muted);
    }

    .details dd {
      margin: 0;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    @media (max-width: 720px) {
      header {
        align-items: flex-start;
        flex-direction: column;
        gap: 6px;
      }

      .meta {
        justify-content: flex-start;
      }

      .layers {
        top: auto;
        right: 10px;
        bottom: 10px;
      }

      .legend,
      .details {
        display: none;
      }

      .toolbar {
        top: 10px;
        left: 10px;
      }
    }
  </style>
</head>

        scale,
        x: pad - bounds.minX * scale + (width - pad * 2 - (bounds.maxX - bounds.minX) * scale) / 2,
        y: pad + bounds.maxY * scale + (height - pad * 2 - (bounds.maxY - bounds.minY) * scale) / 2,
      };
      view = { scale: 1, x: 0, y: 0 };
    }

    function project(coord) {
      const [lon, lat] = coord;
      return {
        x: lon * base.scale * view.scale + base.x * view.scale + view.x,
        y: -lat * base.scale * view.scale + base.y * view.scale + view.y,
      };
    }

    function pathGeometry(geometry) {
      if (!geometry) return;
      const drawLine = (line) => {
        line.forEach((coord, index) => {
          const p = project(coord);
          if (index === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
      };

      if (geometry.type === "LineString") {
        drawLine(geometry.coordinates);
      } else if (geometry.type === "MultiLineString") {
        geometry.coordinates.forEach(drawLine);
      } else if (geometry.type === "Polygon") {
        geometry.coordinates.forEach(drawLine);
      } else if (geometry.type === "MultiPolygon") {
        geometry.coordinates.forEach((polygon) => polygon.forEach(drawLine));
      }
    }

    function lineWidth(feature) {
      const highway = feature.properties && feature.properties.highway;
      if (["motorway", "trunk", "primary"].includes(highway)) return 2.8;
      if (["secondary", "tertiary"].includes(highway)) return 2.1;
      return 1.15;
    }

    function categorizePoi(feature) {
      const p = feature.properties || {};
      if (p.drink_category && POI_CATEGORY_BY_ID[p.drink_category]) {
        return POI_CATEGORY_BY_ID[p.drink_category];
      }
      const cuisine = String(p.cuisine || "").toLowerCase();
      if (cuisine.includes("bubble_tea") || cuisine === "tea" || p.shop === "tea" || p.shop === "beverages") {
        return POI_CATEGORY_BY_ID.milk_tea;
      }
      if (cuisine === "coffee_shop") return POI_CATEGORY_BY_ID.coffee;
      return POI_CATEGORY_BY_ID.other_drink;
    }

    function renderPoiLegend() {
      poiLegend.innerHTML = POI_CATEGORIES
        .filter((category) => poiCategoryCounts[category.id] > 0)
        .map((category) => `
          <div class="legend-row">
            <span class="poi-symbol" style="color:${category.color}">${category.glyph}</span>
            <span class="legend-name">${category.label} · ${poiCategoryCounts[category.id].toLocaleString("zh-CN")}</span>
          </div>
        `)
        .join("");
    }

    function renderPoiCategoryLayers() {
      poiCategoryLayers.innerHTML = POI_CATEGORIES
        .filter((category) => poiCategoryCounts[category.id] > 0)
        .map((category) => `
          <label>
            <span>
              <span class="mini-symbol" style="color:${category.color}">${category.glyph}</span>
              ${category.label} · ${poiCategoryCounts[category.id].toLocaleString("zh-CN")}
            </span>
            <input class="poi-category-toggle" type="checkbox" data-category="${category.id}" checked>
          </label>
        `)
        .join("");
    }

    function isPoiCategoryVisible(category) {
      if (!controls.poi.checked) return false;
      const toggle = poiCategoryLayers.querySelector(`input[data-category="${category.id}"]`);
      return !toggle || toggle.checked;
    }

    function drawBoundary() {
      ctx.save();
      ctx.setLineDash([9, 6]);
      ctx.strokeStyle = getStyle("--boundary");
      ctx.lineWidth = Math.max(1.4, 2 / Math.sqrt(view.scale));
      boundaryData.features.forEach((feature) => {
        ctx.beginPath();
        pathGeometry(feature.geometry);
        ctx.stroke();
      });
      ctx.restore();
    }

    function drawRoads() {
      const roads = mapData.features.filter((feature) => {
        const properties = feature.properties || {};
        return feature.geometry.type !== "Point" && properties.highway;
      });
      roads.sort((a, b) => lineWidth(a) - lineWidth(b));
      roads.forEach((feature) => {
        const highway = feature.properties && feature.properties.highway;
        ctx.beginPath();
        pathGeometry(feature.geometry);
        ctx.strokeStyle = roadTypes.has(highway) ? getStyle("--primary-road") : getStyle("--road");
        ctx.globalAlpha = roadTypes.has(highway) ? 0.9 : 0.55;
        ctx.lineWidth = Math.max(0.65, lineWidth(feature) / Math.sqrt(view.scale));
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      });
      ctx.globalAlpha = 1;
    }

    function drawPoi() {
      poiFeatures.forEach((feature) => {
        if (!isPoiCategoryVisible(feature._poiCategory)) return;
        const p = project(feature.geometry.coordinates);
        drawPoiMarker(p.x, p.y, feature._poiCategory, hoverFeature === feature);
      });
    }

    function drawPoiMarker(x, y, category, highlighted) {
      const size = highlighted ? 6.8 : 4.7;
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = category.color;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = highlighted ? 2 : 1.35;
      ctx.shadowColor = highlighted ? "rgba(21, 32, 29, 0.28)" : "rgba(21, 32, 29, 0.12)";
      ctx.shadowBlur = highlighted ? 7 : 2;

      if (category.marker === "circle") {
        ctx.beginPath();
        ctx.arc(0, 0, size, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      } else if (category.marker === "square") {
        ctx.beginPath();
        ctx.rect(-size, -size, size * 2, size * 2);
        ctx.fill();
        ctx.stroke();
      } else if (category.marker === "diamond") {
        polygon([[0, -size * 1.25], [size * 1.25, 0], [0, size * 1.25], [-size * 1.25, 0]]);
      } else if (category.marker === "triangle") {
        polygon([[0, -size * 1.3], [size * 1.25, size], [-size * 1.25, size]]);
      } else if (category.marker === "cross") {
        const arm = size * 0.55;
        const long = size * 1.35;
        ctx.beginPath();
        ctx.rect(-arm, -long, arm * 2, long * 2);
        ctx.rect(-long, -arm, long * 2, arm * 2);
        ctx.fill();
        ctx.stroke();
      } else if (category.marker === "parking") {
        labeledCircle("P", size * 1.28, size * 1.55);
      } else if (category.marker === "house") {
        polygon([[0, -size * 1.35], [size * 1.2, -size * 0.25], [size * 0.8, size * 1.15], [-size * 0.8, size * 1.15], [-size * 1.2, -size * 0.25]]);
      } else if (category.marker === "star") {
        star(size * 1.45, size * 0.62, 5);
      } else if (category.marker === "info") {
        labeledCircle("i", size * 1.28, size * 1.8);
      } else if (category.marker === "hex") {
        const points = [];
        for (let i = 0; i < 6; i += 1) {
          const angle = Math.PI / 6 + (Math.PI * 2 * i) / 6;
          points.push([Math.cos(angle) * size * 1.25, Math.sin(angle) * size * 1.25]);
        }
        polygon(points);
      } else {
        const long = size * 1.35;
        const arm = size * 0.4;
        ctx.beginPath();
        ctx.rect(-arm, -long, arm * 2, long * 2);
        ctx.rect(-long, -arm, long * 2, arm * 2);
        ctx.fill();
        ctx.stroke();
      }

      ctx.restore();

      function polygon(points) {
        ctx.beginPath();
        points.forEach(([px, py], index) => {
          if (index === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        });
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }

      function star(outer, inner, points) {
        ctx.beginPath();
        for (let i = 0; i < points * 2; i += 1) {
          const radius = i % 2 === 0 ? outer : inner;
          const angle = -Math.PI / 2 + (Math.PI * i) / points;
          const px = Math.cos(angle) * radius;
          const py = Math.sin(angle) * radius;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }

      function labeledCircle(label, radius, fontSize) {
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#ffffff";
        ctx.font = `800 ${fontSize}px Inter, "Segoe UI", sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(label, 0, label === "i" ? -0.5 : 0.1);
      }
    }

    function drawWaterAndParks() {
      mapData.features.forEach((feature) => {
        const props = feature.properties || {};
        const geom = feature.geometry || {};
        if (geom.type === "Point") return;
        if (!props.natural && !props.leisure && !props.landuse) return;
        ctx.beginPath();
        pathGeometry(geom);
        ctx.fillStyle = props.natural === "water" || props.waterway ? "rgba(60, 140, 168, 0.22)" : "rgba(110, 155, 77, 0.18)";
        ctx.strokeStyle = props.natural === "water" || props.waterway ? "rgba(60, 140, 168, 0.42)" : "rgba(110, 155, 77, 0.42)";
        ctx.lineWidth = 1;
        if (geom.type.includes("Polygon")) ctx.fill();
        ctx.stroke();
      });
    }

    function draw() {
      if (!base) return;
      ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
      drawWaterAndParks();
      if (controls.roads.checked) drawRoads();
      if (controls.boundary.checked) drawBoundary();
      if (controls.poi.checked) drawPoi();
    }

    function resize() {
      dpr = window.devicePixelRatio || 1;
      const { clientWidth, clientHeight } = canvas;
      canvas.width = Math.floor(clientWidth * dpr);
      canvas.height = Math.floor(clientHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      fitView();
      draw();
    }

    function zoomAt(factor, cx, cy) {
      const oldScale = view.scale;
      const nextScale = Math.min(48, Math.max(0.55, oldScale * factor));
      const applied = nextScale / oldScale;
      view.x = cx - (cx - view.x) * applied;
      view.y = cy - (cy - view.y) * applied;
      view.scale = nextScale;
      draw();
    }

    function nearestPoint(x, y) {
      let best = null;
      let bestDist = 14;
      for (const feature of poiFeatures) {
        if (!isPoiCategoryVisible(feature._poiCategory)) continue;
        const p = project(feature.geometry.coordinates);
        const dist = Math.hypot(p.x - x, p.y - y);
        if (dist < bestDist) {
          best = feature;
          bestDist = dist;
        }
      }
      return best;
    }

    function showDetails(feature) {
      if (!feature) {
        details.querySelector("strong").textContent = "香港中文大学";
        const categoryRows = POI_CATEGORIES
          .filter((category) => poiCategoryCounts[category.id] > 0)
          .map((category) => [category.label, `${poiCategoryCounts[category.id].toLocaleString("zh-CN")} 个`]);
        detailsList.innerHTML = [
          ["边界", `${boundaryData.features.length} 个`],
          ["地图要素", `${mapData.features.length.toLocaleString("zh-CN")} 个`],
          ["道路/线面", `${mapData.features.filter((f) => f.geometry.type !== "Point").length.toLocaleString("zh-CN")} 个`],
          ["POI", `${poiFeatures.length.toLocaleString("zh-CN")} 个`],
          ...categoryRows,
        ].map(([k, v]) => `<dt>${escapeHtml(k)}</dt><dd>${escapeHtml(v)}</dd>`).join("");
        return;
      }

      const p = feature.properties || {};
      const category = feature._poiCategory || categorizePoi(feature);
      const name = featureName(feature);
      const rawType = p.amenity || p.shop || p.tourism || p.public_transport || p.railway || p.highway;
      const rows = [
        ["名称", name || "未命名"],
        ["分类", category.label],
        ["OSM 类型", rawType],
        ["OSM", p["@id"] || ""],
      ].filter(([, value]) => value);

      details.querySelector("strong").textContent = name || category.label;
      detailsList.innerHTML = rows.map(([k, v]) => `<dt>${escapeHtml(k)}</dt><dd>${escapeHtml(String(v))}</dd>`).join("");
    }

    function featureName(feature) {
      const p = feature.properties || {};
      return p.name || p["name:zh"] || p["name:zh-Hans"] || p["name:en"] || "";
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function getStyle(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    canvas.addEventListener("pointerdown", (event) => {
      dragging = true;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(event.pointerId);
      dragStart = { x: event.clientX, y: event.clientY, vx: view.x, vy: view.y };
    });

    canvas.addEventListener("pointermove", (event) => {
      const rect = canvas.getBoundingClientRect();
      pointer = { x: event.clientX - rect.left, y: event.clientY - rect.top };
      if (dragging && dragStart) {
        view.x = dragStart.vx + event.clientX - dragStart.x;
        view.y = dragStart.vy + event.clientY - dragStart.y;
        draw();
      } else if (controls.poi.checked) {
        const nextHover = nearestPoint(pointer.x, pointer.y);
        if (nextHover !== hoverFeature) {
          hoverFeature = nextHover;
          showDetails(hoverFeature);
          draw();
        }
      }
    });

    canvas.addEventListener("pointerup", (event) => {
      dragging = false;
      canvas.classList.remove("dragging");
      canvas.releasePointerCapture(event.pointerId);
    });

    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const factor = event.deltaY < 0 ? 1.18 : 1 / 1.18;
      zoomAt(factor, event.clientX - rect.left, event.clientY - rect.top);
    }, { passive: false });

    document.getElementById("zoomIn").addEventListener("click", () => zoomAt(1.3, canvas.clientWidth / 2, canvas.clientHeight / 2));
    document.getElementById("zoomOut").addEventListener("click", () => zoomAt(1 / 1.3, canvas.clientWidth / 2, canvas.clientHeight / 2));
    document.getElementById("reset").addEventListener("click", () => {
      fitView();
      draw();
    });

    Object.values(controls).forEach((control) => control.addEventListener("change", () => {
      if (hoverFeature && !isPoiCategoryVisible(hoverFeature._poiCategory)) {
        hoverFeature = null;
        showDetails(null);
      }
      draw();
    }));
    poiCategoryLayers.addEventListener("change", () => {
      if (hoverFeature && !isPoiCategoryVisible(hoverFeature._poiCategory)) {
        hoverFeature = null;
        showDetails(null);
      }
      draw();
    });
    window.addEventListener("resize", resize);
    showDetails(null);
    resize();
  </script>
</body>
</html>
