<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>香港中文大学咖啡茶饮地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --ink: #14211d;
      --muted: #61736d;
      --panel: rgba(255, 255, 255, 0.94);
      --line: rgba(22, 37, 32, 0.14);
      --road: #d08148;
      --main-road: #b94d3e;
      --coffee: #8c5a35;
      --tea: #1f9ca3;
      --park: #7aa665;
      --water: #4d9fb5;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: #edf1ed;
      overflow: hidden;
    }

    header {
      position: fixed;
      z-index: 500;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 760;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    #map {
      position: fixed;
      inset: 56px 0 0 0;
      background: #e8eee8;
    }

    .panel {
      position: fixed;
      z-index: 520;
      right: 16px;
      bottom: 16px;
      width: min(340px, calc(100vw - 32px));
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 40px rgba(24, 36, 31, 0.14);
      backdrop-filter: blur(14px);
    }

    .panel strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .row {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 12px;
      margin: 4px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .row span:last-child {
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .leaflet-control-layers,
    .leaflet-bar a {
      border: 1px solid var(--line) !important;
      box-shadow: 0 12px 28px rgba(24, 36, 31, 0.14) !important;
    }

    .leaflet-control-layers {
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--panel);
    }

    .leaflet-control-layers label {
      margin: 6px 0;
      font-size: 13px;
    }

    .poi-dot {
      width: 13px;
      height: 13px;
      border: 2px solid #fff;
      border-radius: 999px;
      background: var(--coffee);
      box-shadow: 0 2px 8px rgba(20, 33, 29, 0.25);
    }

    .poi-diamond {
      width: 13px;
      height: 13px;
      border: 2px solid #fff;
      background: var(--tea);
      transform: rotate(45deg);
      box-shadow: 0 2px 8px rgba(20, 33, 29, 0.25);
    }

    .loading {
      position: fixed;
      z-index: 530;
      left: 16px;
      bottom: 16px;
      max-width: min(420px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      box-shadow: 0 18px 40px rgba(24, 36, 31, 0.14);
    }

    .loading.error {
      color: #9b2f26;
    }

    @media (max-width: 720px) {
      header {
        height: auto;
        min-height: 64px;
        align-items: flex-start;
        flex-direction: column;
        padding: 10px 12px;
        gap: 4px;
      }

      h1 { font-size: 17px; }
      .meta {
        flex-wrap: wrap;
        gap: 6px 10px;
        white-space: normal;
      }

      #map { inset-top: 82px; }
      .panel {
        left: 12px;
        right: 12px;
        bottom: 12px;
        width: auto;
      }
    }
  </style>
</head>

2.4200642],[114.213858,22.4200169],[114.2139544,22.4200283],[114.2139966,22.4200209],[114.2140294,22.4199942],[114.2140478,22.420002],[114.214061,22.4199687],[114.2140639,22.4199436],[114.2140433,22.4198304],[114.2139896,22.419488],[114.2139588,22.4194908],[114.2139548,22.419461],[114.2140207,22.4194544],[114.2140688,22.4194496],[114.2140826,22.4194482],[114.2141311,22.4197498],[114.2141581,22.4199175],[114.2141794,22.420096],[114.2141851,22.4201279],[114.2141914,22.4201636],[114.2141874,22.4201803],[114.2141622,22.4204234],[114.2141468,22.4205721],[114.214145,22.4205932],[114.2141225,22.420852],[114.2141203,22.4208798],[114.2140999,22.4211338],[114.2140453,22.4216868],[114.2140074,22.4221413],[114.2140056,22.4221632],[114.2139914,22.422334],[114.2139727,22.4224813],[114.2139398,22.4227398],[114.2138978,22.4229516],[114.2138385,22.4231797],[114.2138321,22.4232017],[114.213611,22.4231432],[114.2134892,22.4231054],[114.2133992,22.4230564],[114.2132758,22.4229836],[114.213101,22.4228696],[114.2130617,22.4228505],[114.21302,22.4228406],[114.2128562,22.4228366],[114.2128211,22.4228348],[114.2127952,22.4228187],[114.2127834,22.4227863]]],[[[114.214245,22.4223809],[114.214336,22.4214361],[114.2145286,22.4215989],[114.214831,22.4220652],[114.2149419,22.4223377],[114.2148963,22.4223897],[114.2147094,22.4224562],[114.214245,22.4223809]]]]}}]};
    const OVERPASS_QUERY = `
      [out:json][timeout:180];
      area(${CUHK_RELATION_AREA})->.searchArea;
      (
        way["highway"](area.searchArea);
        way["natural"](area.searchArea);
        way["landuse"](area.searchArea);
        way["leisure"](area.searchArea);
        way["waterway"](area.searchArea);
        node["amenity"="cafe"](area.searchArea);
        node["cuisine"~"coffee|bubble_tea|tea",i](area.searchArea);
        node["shop"~"coffee|tea|beverages",i](area.searchArea);
        node["name"~"coffee|cafe|café|bubble tea|咖啡|奶茶|茶飲|茶饮",i](area.searchArea);
        node["brand"~"coffee|cafe|café|bubble tea|咖啡|奶茶|茶飲|茶饮",i](area.searchArea);
      );
      out body;
      >;

    const map = L.map("map", {
      zoomControl: false,
      preferCanvas: true
    }).setView(CUHK_CENTER, 16);

    L.control.zoom({ position: "topleft" }).addTo(map);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 20,
      attribution: "© OpenStreetMap contributors"
    }).addTo(map);

    const boundaryLayer = L.geoJSON(null, {
      style: {
        color: "#111a18",
        weight: 2,
        dashArray: "8 6",
        fillOpacity: 0
      }
    }).addTo(map);

    const roadsLayer = L.geoJSON(null, {
      style: (feature) => {
        const highway = tagsOf(feature).highway;
        const major = ["primary", "secondary", "tertiary", "trunk"].includes(highway);
        return {
          color: major ? "#b94d3e" : "#d08148",
          weight: major ? 2.4 : 1.2,
          opacity: major ? 0.9 : 0.62,
          lineCap: "round",
          lineJoin: "round"
        };
      }
    }).addTo(map);

    const landscapeLayer = L.geoJSON(null, {
      style: (feature) => {
        const tags = tagsOf(feature);
        if (tags.natural === "water" || tags.waterway || tags.water) {
          return { color: "#4d9fb5", weight: 1, fillColor: "#4d9fb5", fillOpacity: 0.24, opacity: 0.7 };
        }
        return { color: "#7aa665", weight: 1, fillColor: "#7aa665", fillOpacity: 0.18, opacity: 0.55 };
      }
    }).addTo(map);

    const coffeeLayer = L.layerGroup().addTo(map);
    const teaLayer = L.layerGroup().addTo(map);

    L.control.layers(null, {
      "校园边界": boundaryLayer,
      "道路": roadsLayer,
      "绿地 / 水体": landscapeLayer,
      "咖啡": coffeeLayer,
      "奶茶茶饮": teaLayer
    }, {
      collapsed: false,
      position: "topright"
    }).addTo(map);

    function tagsOf(feature) {
      return (feature.properties && (feature.properties.tags || feature.properties)) || {};
    }

    function readableName(tags) {
      return tags.name || tags["name:zh"] || tags["name:en"] || tags.brand || tags.operator || "未命名地点";
    }

    function isBoundary(feature) {
      const tags = tagsOf(feature);
      const names = [tags.name, tags["name:en"], tags["name:zh"]].filter(Boolean).join(" ");
      return tags.amenity === "university" && /Chinese University|中文大學|中文大学|CUHK/i.test(names);
    }

    function isRoad(feature) {
      const tags = tagsOf(feature);
      return Boolean(tags.highway) && feature.geometry && feature.geometry.type !== "Point";
    }

    function isLandscape(feature) {
      const tags = tagsOf(feature);
      return feature.geometry && feature.geometry.type !== "Point" && (
        tags.natural === "water" ||
        Boolean(tags.water || tags.waterway) ||
        Boolean(tags.landuse) ||
        ["park", "garden", "pitch", "stadium", "sports_centre"].includes(tags.leisure)
      );
    }

    function drinkCategory(tags) {
      const text = [tags.name, tags["name:en"], tags["name:zh"], tags.brand, tags.operator, tags.cuisine, tags.shop]
        .filter(Boolean)
        .join(" ")
        .toLowerCase();
      if (/bubble[_ -]?tea|milk[_ -]?tea|奶茶|茶飲|茶饮|喜茶|贡茶|貢茶/.test(text)) return "tea";
      if (tags.amenity === "cafe" || /coffee|cafe|café|咖啡|starbucks|pacific coffee/.test(text)) return "coffee";
      return null;
    }

    function addPoi(feature, category) {
      if (!feature.geometry || feature.geometry.type !== "Point") return false;
      const tags = tagsOf(feature);
      const coords = feature.geometry.coordinates;
      const marker = category === "tea"
        ? L.marker([coords[1], coords[0]], {
            icon: L.divIcon({ className: "", html: "<div class='poi-diamond'></div>", iconSize: [18, 18], iconAnchor: [9, 9] })
          })
        : L.marker([coords[1], coords[0]], {
            icon: L.divIcon({ className: "", html: "<div class='poi-dot'></div>", iconSize: [18, 18], iconAnchor: [9, 9] })
          });

      marker.bindPopup(`
        <strong>${escapeHtml(readableName(tags))}</strong>
        <div>${category === "tea" ? "奶茶茶饮" : "咖啡"}</div>
        ${tags.opening_hours ? `<div>营业时间：${escapeHtml(tags.opening_hours)}</div>` : ""}
      `);
      marker.addTo(category === "tea" ? teaLayer : coffeeLayer);
      return true;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[ch]));
    }

    function sameCoordinate(a, b) {
      return a && b && a[0] === b[0] && a[1] === b[1];
    }

    function osmToGeojson(osm) {
      const nodes = new Map();
      const features = [];

      osm.elements.forEach((element) => {
        if (element.type === "node") {
          nodes.set(element.id, [element.lon, element.lat]);
        }
      });

      osm.elements.forEach((element) => {
        if (element.type === "node" && element.tags) {
          features.push({
            type: "Feature",
            properties: { ...element.tags, osm_type: "node", osm_id: element.id },
            geometry: { type: "Point", coordinates: [element.lon, element.lat] }
          });
        }

        if (element.type === "way" && element.tags && Array.isArray(element.nodes)) {
          const coordinates = element.nodes.map((id) => nodes.get(id)).filter(Boolean);
          if (coordinates.length < 2) return;
          const closed = coordinates.length > 3 && sameCoordinate(coordinates[0], coordinates[coordinates.length - 1]);
          const geometry = closed && !element.tags.highway
            ? { type: "Polygon", coordinates: [coordinates] }
            : { type: "LineString", coordinates };
          features.push({
            type: "Feature",
            properties: { ...element.tags, osm_type: "way", osm_id: element.id },
            geometry
          });
        }
      });

      return { type: "FeatureCollection", features };
    }

    function updateStats(stats) {
      document.getElementById("count").textContent = `${stats.features.toLocaleString("zh-CN")} 个要素 · ${stats.poi.toLocaleString("zh-CN")} 个 POI`;
      document.getElementById("stats").innerHTML = `
        <div class="row"><span>边界</span><span>${stats.boundaries.toLocaleString("zh-CN")} 个</span></div>
        <div class="row"><span>道路</span><span>${stats.roads.toLocaleString("zh-CN")} 条</span></div>
        <div class="row"><span>咖啡</span><span>${stats.coffee.toLocaleString("zh-CN")} 个</span></div>
        <div class="row"><span>奶茶茶饮</span><span>${stats.tea.toLocaleString("zh-CN")} 个</span></div>
        <div class="row"><span>数据源</span><span>OpenStreetMap / Overpass 实时读取</span></div>
      `;
    }

    async function loadData() {
      const loading = document.getElementById("loading");
      const response = await fetch(OVERPASS_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
        body: "data=" + encodeURIComponent(OVERPASS_QUERY)
      });
      if (!response.ok) throw new Error(`Overpass 返回 ${response.status}`);
      const osm = await response.json();
      const geojson = osmToGeojson(osm);
      const stats = { features: geojson.features.length + CUHK_BOUNDARY.features.length, boundaries: CUHK_BOUNDARY.features.length, roads: 0, coffee: 0, tea: 0, poi: 0 };

      boundaryLayer.addData(CUHK_BOUNDARY);

      geojson.features.forEach((feature) => {
        if (isRoad(feature)) {
          roadsLayer.addData(feature);
          stats.roads += 1;
          return;
        }
        if (isLandscape(feature)) {
          landscapeLayer.addData(feature);
          return;
        }
        const tags = tagsOf(feature);
        const category = drinkCategory(tags);
        if (category && addPoi(feature, category)) {
          stats[category] += 1;
          stats.poi += 1;
        }
      });

      if (boundaryLayer.getLayers().length) {
        map.fitBounds(boundaryLayer.getBounds(), { padding: [28, 28] });
      }
      updateStats(stats);
      loading.textContent = "加载完成。可在右上角选择显示或隐藏边界、道路、绿地/水体和 POI。";
      setTimeout(() => loading.remove(), 4200);
    }

    loadData().catch((error) => {
      const loading = document.getElementById("loading");
      loading.classList.add("error");
      loading.textContent = `加载失败：${error.message}`;
      document.getElementById("stats").innerHTML = "<div class='row'><span>状态</span><span>加载失败，请稍后刷新</span></div>";
    });
  </script>
</body>
</html>
