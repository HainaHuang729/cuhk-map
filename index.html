<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>香港中文大学餐饮校巴地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --ink: #14211d;
      --muted: #61736d;
      --panel: rgba(255, 255, 255, 0.94);
      --line: rgba(22, 37, 32, 0.14);
      --road: #d08148;
      --main-road: #b94d3e;
      --restaurant: #b35a2a;
      --fast-food: #c58a1b;
      --coffee: #8c5a35;
      --tea: #1f9ca3;
      --park: #7aa665;
      --water: #4d9fb5;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: #edf1ed;
      overflow: hidden;
    }

    #map {
      position: fixed;
      inset: 0;
      background: #e8eee8;
    }

    .panel {
      display: none;
      position: fixed;
      z-index: 520;
      right: 16px;
      bottom: 16px;
      width: min(340px, calc(100vw - 32px));
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 40px rgba(24, 36, 31, 0.14);
      backdrop-filter: blur(14px);
    }

    .panel strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .row {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 12px;
      margin: 4px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .row span:last-child {
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .bus-route-dock {
      position: fixed;
      z-index: 900;
      left: 50%;
      right: auto;
      bottom: calc(12px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(720px, calc(100vw - 24px));
      height: 44px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 12px 28px rgba(24, 36, 31, 0.16);
      backdrop-filter: blur(12px);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .bus-route-dock::-webkit-scrollbar {
      display: none;
    }

    .bus-route-chip {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      height: 30px;
      min-width: 42px;
      padding: 0 9px;
      border: 1px solid rgba(20, 33, 29, 0.16);
      border-radius: 999px;
      background: #fff;
      color: var(--route-color);
      box-shadow: 0 2px 8px rgba(24, 36, 31, 0.1);
      font: inherit;
      font-size: 12px;
      font-weight: 850;
      line-height: 1;
      cursor: pointer;
      white-space: nowrap;
    }

    .bus-route-chip.is-active {
      border-color: var(--route-color);
      background: var(--route-color);
      color: #fff;
      box-shadow: 0 4px 12px rgba(24, 36, 31, 0.18);
    }

    .bus-route-chip-mark {
      width: 14px;
      height: 0;
      border-top: 4px solid currentColor;
      border-radius: 999px;
    }

    .route-message-panel {
      position: fixed;
      z-index: 890;
      left: 16px;
      bottom: calc(72px + env(safe-area-inset-bottom));
      width: min(360px, calc(100vw - 32px));
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 14px 34px rgba(24, 36, 31, 0.14);
      backdrop-filter: blur(12px);
      font-size: 12px;
    }

    .route-message-panel[hidden] {
      display: none;
    }

    .route-message-panel strong {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
    }

    .route-message-body {
      display: grid;
      gap: 7px;
    }

    .route-report-row {
      display: grid;
      gap: 2px;
      color: var(--ink);
      line-height: 1.28;
    }

    .route-report-row small {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .route-report-empty {
      color: var(--muted);
    }

    .leaflet-control-layers,
    .leaflet-bar a {
      border: 1px solid var(--line) !important;
      box-shadow: 0 12px 28px rgba(24, 36, 31, 0.14) !important;
    }

    .leaflet-control-layers {
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--panel);
    }

    .leaflet-control-layers label {
      margin: 6px 0;
      font-size: 13px;
    }

    .leaflet-bottom .leaflet-control {
      margin-bottom: 68px;
    }

    .poi-marker {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      background: var(--poi-color, var(--coffee));
      box-shadow: 0 2px 8px rgba(20, 33, 29, 0.25);
      color: #fff;
      font-size: 10px;
      font-weight: 850;
      line-height: 1;
      text-shadow: 0 1px 2px rgba(20, 33, 29, 0.32);
    }

    .poi-marker-glyph {
      position: relative;
      z-index: 1;
    }

    .poi-circle {
      border-radius: 999px;
    }

    .poi-diamond {
      transform: rotate(45deg);
      border-radius: 2px;
    }

    .poi-diamond .poi-marker-glyph {
      transform: rotate(-45deg);
    }

    .poi-square {
      border-radius: 3px;
    }

    .poi-triangle {
      border: 0;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
    }

    .poi-triangle .poi-marker-glyph {
      transform: translateY(2px);
    }

    .poi-plus {
      position: relative;
      border-radius: 3px;
    }

    .poi-plus .poi-marker-glyph {
      color: var(--poi-color, var(--coffee));
      text-shadow: none;
    }

    .poi-plus::before,
    .poi-plus::after {
      content: "";
      position: absolute;
      background: #fff;
      inset: 5px 2px;
    }

    .poi-plus::after {
      inset: 2px 5px;
    }

    .poi-cross {
      border: 0;
      clip-path: polygon(35% 0, 65% 0, 65% 35%, 100% 35%, 100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0 65%, 0 35%, 35% 35%);
    }

    .poi-house {
      border-radius: 1px;
      clip-path: polygon(50% 0, 100% 40%, 86% 100%, 14% 100%, 0 40%);
    }

    .poi-hex {
      border-radius: 0;
      clip-path: polygon(25% 0, 75% 0, 100% 50%, 75% 100%, 25% 100%, 0 50%);
    }

    .poi-layer-swatch {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 14px;
      height: 14px;
      margin-top: 2px;
      border: 2px solid #fff;
      background: currentColor;
      box-shadow: 0 1px 4px rgba(20, 33, 29, 0.2);
      color: #fff;
      font-size: 8px;
      font-weight: 850;
      line-height: 1;
    }

    .poi-layer-swatch.circle {
      border-radius: 999px;
    }

    .poi-layer-swatch.diamond {
      transform: rotate(45deg);
      border-radius: 2px;
    }

    .poi-layer-swatch.diamond span {
      transform: rotate(-45deg);
    }

    .poi-layer-swatch.square {
      border-radius: 3px;
    }

    .poi-layer-swatch.triangle {
      border: 0;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
    }

    .poi-layer-swatch.triangle span {
      transform: translateY(1px);
    }

    .poi-layer-swatch.cross {
      border: 0;
      clip-path: polygon(35% 0, 65% 0, 65% 35%, 100% 35%, 100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0 65%, 0 35%, 35% 35%);
    }

    .poi-layer-swatch.house {
      border-radius: 1px;
      clip-path: polygon(50% 0, 100% 40%, 86% 100%, 14% 100%, 0 40%);
    }

    .poi-layer-swatch.hex {
      border-radius: 0;
      clip-path: polygon(25% 0, 75% 0, 100% 50%, 75% 100%, 25% 100%, 0 50%);
    }

    .poi-layer-swatch-group {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      margin-top: 2px;
    }

    .poi-layer-swatch-group .poi-layer-swatch {
      width: 13px;
      height: 13px;
      margin-top: 0;
      font-size: 7px;
    }

    .bus-stop-marker {
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border: 2px solid #fff;
      border-radius: 6px;
      background: #26332f;
      color: #fff;
      box-shadow: 0 2px 8px rgba(20, 33, 29, 0.24);
      font-size: 11px;
      font-weight: 850;
      line-height: 1;
    }

    .bus-stop-direction-marker {
      display: grid;
      place-items: center;
      min-width: 18px;
      height: 16px;
      padding: 0 4px;
      border: 1px solid rgba(38, 51, 47, 0.24);
      border-left: 3px solid var(--route-color);
      border-radius: 5px;
      background: #fff;
      color: var(--route-color);
      box-shadow: 0 2px 7px rgba(20, 33, 29, 0.2);
      font-size: 10px;
      font-weight: 850;
      line-height: 1;
      white-space: nowrap;
    }

    .bus-route-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 20px;
      padding: 0 6px;
      border: 2px solid #fff;
      border-radius: 999px;
      background: var(--route-color);
      color: #fff;
      box-shadow: 0 2px 8px rgba(20, 33, 29, 0.22);
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .bus-vehicle-marker {
      position: relative;
      display: grid;
      place-items: center;
      box-sizing: border-box;
      width: 38px;
      height: 22px;
      padding: 0 10px 0 6px;
      border: 2px solid #fff;
      border-radius: 5px;
      background: var(--route-color);
      color: #fff;
      box-shadow: 0 3px 10px rgba(20, 33, 29, 0.28);
      font-size: 9px;
      font-weight: 850;
      line-height: 1;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 0 100%);
      transform-origin: center;
      transform: rotate(var(--vehicle-bearing));
    }

    .bus-vehicle-label {
      display: grid;
      place-items: center;
      min-width: 18px;
      height: 14px;
      padding: 0 3px;
      border-radius: 4px;
      background: #fff;
      color: var(--route-color);
      font-size: 9px;
      font-weight: 850;
      line-height: 1;
      transform: rotate(var(--label-bearing));
      transform-origin: center;
    }

    .passenger-report-marker {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border: 2px solid #fff;
      border-radius: 999px;
      background: #146aa0;
      box-shadow: 0 4px 14px rgba(20, 33, 29, 0.32);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .gps-collector {
      position: fixed;
      z-index: 910;
      top: calc(14px + env(safe-area-inset-top));
      left: 58px;
      width: min(316px, calc(100vw - 116px));
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 12px 28px rgba(24, 36, 31, 0.15);
      backdrop-filter: blur(12px);
    }

    .gps-collector.is-recording {
      border-color: rgba(25, 112, 78, 0.34);
      box-shadow: 0 14px 34px rgba(25, 112, 78, 0.18);
    }

    .gps-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .gps-head strong {
      font-size: 13px;
    }

    .gps-status {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .gps-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 8px;
    }

    .gps-fields label {
      display: grid;
      gap: 3px;
      min-width: 0;
      color: var(--muted);
      font-size: 10px;
      font-weight: 750;
      line-height: 1.1;
    }

    .gps-fields label.wide {
      grid-column: 1 / -1;
    }

    .gps-fields select,
    .gps-fields input {
      width: 100%;
      min-width: 0;
      height: 30px;
      border: 1px solid rgba(20, 33, 29, 0.16);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      outline: none;
    }

    .gps-fields select {
      padding: 0 6px;
    }

    .gps-fields input {
      padding: 0 8px;
    }

    .gps-actions {
      display: flex;
      gap: 6px;
    }

    .gps-event-actions {
      margin-top: 6px;
    }

    .gps-actions button {
      flex: 1 1 0;
      min-width: 0;
      height: 30px;
      border: 1px solid rgba(20, 33, 29, 0.16);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .gps-actions button.primary {
      border-color: #19704e;
      background: #19704e;
      color: #fff;
    }

    .gps-actions button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .gps-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .gps-stats span {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gps-live-marker,
    .gps-sample-marker {
      display: block;
      border: 2px solid #fff;
      border-radius: 999px;
      box-shadow: 0 2px 9px rgba(20, 33, 29, 0.28);
    }

    .gps-live-marker {
      position: relative;
      width: 18px;
      height: 18px;
      background: #19704e;
    }

    .gps-live-marker::after {
      content: "";
      position: absolute;
      inset: -7px;
      border: 2px solid rgba(25, 112, 78, 0.28);
      border-radius: 999px;
    }

    .gps-sample-marker {
      width: 9px;
      height: 9px;
      background: #19704e;
      opacity: 0.78;
    }

    .gps-event-marker {
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border: 2px solid #fff;
      border-radius: 999px;
      background: #19704e;
      box-shadow: 0 3px 10px rgba(20, 33, 29, 0.3);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .gps-event-depart {
      background: #b45f18;
    }

    .route-key {
      display: inline-flex;
      align-items: flex-start;
      gap: 6px;
      max-width: 250px;
    }

    .route-swatch {
      flex: 0 0 auto;
      width: 18px;
      height: 0;
      margin-top: 6px;
      border-top: 4px solid currentColor;
      border-radius: 999px;
    }

    .route-key-text {
      display: grid;
      gap: 2px;
      min-width: 0;
      line-height: 1.22;
    }

    .route-key small {
      color: var(--muted);
      font-size: 11px;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .loading {
      position: fixed;
      z-index: 930;
      left: 16px;
      bottom: calc(72px + env(safe-area-inset-bottom));
      max-width: min(420px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      box-shadow: 0 18px 40px rgba(24, 36, 31, 0.14);
    }

    .loading.error {
      color: #9b2f26;
    }

    @media (max-width: 720px) {
      .bus-route-dock {
        bottom: calc(10px + env(safe-area-inset-bottom));
        width: min(520px, calc(100vw - 16px));
        height: 40px;
        gap: 6px;
        padding: 6px 8px;
      }

      .bus-route-chip {
        height: 28px;
        min-width: 38px;
        padding: 0 8px;
        font-size: 11px;
      }

      .bus-route-chip-mark {
        width: 12px;
        border-top-width: 3px;
      }

      .route-message-panel {
        left: 8px;
        bottom: calc(58px + env(safe-area-inset-bottom));
        width: min(312px, calc(100vw - 16px));
        padding: 10px;
      }

      .leaflet-left .leaflet-control {
        margin-left: 8px;
        margin-top: 8px;
      }

      .leaflet-right .leaflet-control {
        margin-right: 8px;
        margin-top: 8px;
      }

      .leaflet-bar a {
        width: 30px;
        height: 30px;
        line-height: 30px;
        font-size: 16px;
      }

      .gps-collector {
        top: calc(8px + env(safe-area-inset-top));
        left: 48px;
        width: min(304px, calc(100vw - 104px));
        padding: 8px;
      }

      .gps-head {
        margin-bottom: 6px;
      }

      .gps-actions button {
        height: 28px;
        font-size: 11px;
      }

      .gps-stats {
        gap: 4px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        font-size: 10px;
      }

      .gps-fields select,
      .gps-fields input {
        height: 28px;
        font-size: 11px;
      }

      .leaflet-control-layers:not(.leaflet-control-layers-expanded) {
        width: 32px;
        height: 32px;
        overflow: hidden;
        padding: 0;
      }

      .leaflet-control-layers-toggle {
        width: 30px !important;
        height: 30px !important;
        background-size: 16px 16px;
      }

      .leaflet-control-layers {
        width: min(236px, calc(100vw - 64px));
        max-height: min(46vh, 360px);
        overflow: auto;
        padding: 7px 8px;
        border-radius: 7px;
      }

      .leaflet-control-layers label {
        margin: 3px 0;
        font-size: 12px;
      }

      .leaflet-bottom .leaflet-control {
        margin-bottom: 62px;
      }

      .route-key {
        max-width: 198px;
        gap: 5px;
      }

      .route-swatch {
        width: 14px;
        margin-top: 5px;
        border-top-width: 3px;
      }

      .route-key-text {
        line-height: 1.16;
      }

      .route-key small {
        font-size: 10px;
      }

      .poi-layer-swatch-group {
        gap: 1px;
      }

      .poi-layer-swatch-group .poi-layer-swatch {
        width: 11px;
        height: 11px;
        font-size: 6px;
      }

      .panel {
        left: 12px;
        right: 12px;
        bottom: 12px;
        width: auto;
      }

      .loading {
        left: 10px;
        right: 10px;
        bottom: calc(66px + env(safe-area-inset-bottom));
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <span id="count" hidden>正在加载 OSM 数据</span>
  <nav id="busRouteDock" class="bus-route-dock" aria-label="校巴线路"></nav>
  <section id="gpsCollector" class="gps-collector" aria-label="GPS采集">
    <div class="gps-head">
      <strong>GPS采集</strong>
      <span id="gpsStatus" class="gps-status">未开始</span>
    </div>
    <div class="gps-fields">
      <label>
        <span>线路</span>
        <select id="gpsRoute" aria-label="采集线路"></select>
      </label>
      <label>
        <span>方向</span>
        <select id="gpsDirection" aria-label="采集方向">
          <option value="">按线路</option>
          <option value="上行">上行</option>
          <option value="下行">下行</option>
          <option value="环线">环线</option>
        </select>
      </label>
      <label class="wide">
        <span>上车站</span>
        <select id="gpsBoardStop" aria-label="上车站"></select>
      </label>
      <label class="wide">
        <span>备注</span>
        <input id="gpsNote" type="text" maxlength="80" autocomplete="off" placeholder="车辆、拥堵、异常">
      </label>
    </div>
    <div class="gps-actions">
      <button id="gpsToggle" class="primary" type="button">开始</button>
      <button id="gpsExport" type="button" disabled>导出</button>
      <button id="gpsClear" type="button" disabled>清空</button>
    </div>
    <div class="gps-actions gps-event-actions">
      <button id="gpsBoard" type="button" disabled>上车上报</button>
      <button id="gpsArrive" type="button" disabled>到站</button>
      <button id="gpsDepart" type="button" disabled>离站</button>
    </div>
    <div class="gps-stats" aria-live="polite">
      <span id="gpsPointCount">0 点</span>
      <span id="gpsEventCount">0 记</span>
      <span id="gpsAccuracy">精度 --</span>
      <span id="gpsUpdated">--:--</span>
    </div>
  </section>
  <section id="routeMessagePanel" class="route-message-panel" aria-label="线路消息" hidden>
    <strong id="routeMessageTitle">线路消息</strong>
    <div id="routeMessageBody" class="route-message-body"></div>
  </section>
  <main id="map" aria-label="香港中文大学地图"></main>

    function routeLatLngs(route) {
      const coords = CUHK_BUS_UTILS.routeCoordinates(route);
      return coords.map((coord) => [coord[1], coord[0]]);
    }

    function routeStopNames(route) {

        .filter(Boolean)
        .map((stop) => stop.name);
    }

    function busVehicleLabel(route) {
      return String(route.id).replace(/^MINI-/, "M-");
    }

    function renderBusRouteDock() {
      busRouteDock.innerHTML = CUHK_BUS_DATA.routes.map((route) => `

          class="bus-route-chip"
          type="button"
          data-route-id="${escapeHtml(route.id)}"
          style="--route-color:${route.color}"
          aria-pressed="false"
          title="校巴 ${escapeHtml(route.id)} · ${escapeHtml(route.name)}"
        >
          <span class="bus-route-chip-mark"></span>
          <span>${escapeHtml(busVehicleLabel(route))}</span>
        </button>
      `).join("");
      syncBusRouteDock();
    }

    function handleBusRouteDockClick(event) {
      const button = event.target.closest(".bus-route-chip");
      if (!button) return;
      setOnlyBusRoute(button.dataset.routeId);
    }

    function syncBusRouteDock() {
      busRouteDock.querySelectorAll(".bus-route-chip").forEach((button) => {
        const route = CUHK_BUS_DATA.routes.find((item) => item.id === button.dataset.routeId);
        const active = Boolean(route && map.hasLayer(routeLayerGroups[route.id]));
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });
    }

    function setRouteVisible(route, visible) {
      const layer = routeLayerGroups[route.id];
      if (!layer) return;
      if (visible && !map.hasLayer(layer)) map.addLayer(layer);
      if (!visible && map.hasLayer(layer)) map.removeLayer(layer);
    }

    function setOnlyBusRoute(routeId) {
      const target = CUHK_BUS_DATA.routes.find((route) => route.id === routeId);
      const shouldShowTarget = Boolean(target && !map.hasLayer(routeLayerGroups[target.id]));
      CUHK_BUS_DATA.routes.forEach((route) => {
        setRouteVisible(route, shouldShowTarget && route.id === routeId);
      });
      updateBusStops();
      updateBusVehicles();
      renderPassengerReports();
      updateRouteMessagePanel();
      syncBusRouteDock();
    }

    function poiLayerGroupKeyHtml(group) {
      const symbols = group.categoryIds
        .map((id) => POI_CATEGORY_BY_ID[id])
        .filter(Boolean)
        .map((category) => `
          <span class="poi-layer-swatch ${category.marker}" style="color:${category.color}">
            <span>${escapeHtml(category.glyph)}</span>
          </span>
        `)
        .join("");
      return `
        <span class="route-key">
          <span class="poi-layer-swatch-group">${symbols}</span>
          <span class="route-key-text"><span>${escapeHtml(group.label)}</span></span>
        </span>
      `;
    }

    function poiLayerGroupForCategory(category) {
      return POI_LAYER_GROUP_BY_CATEGORY[category.id] || { id: category.id, label: category.label, categoryIds: [category.id] };
    }

    function poiLayerGroupCount(group, stats) {
      return group.categoryIds.reduce((sum, id) => sum + (stats.poiCategories[id] || 0), 0);
    }

    function visibleBusRoutes() {
      return CUHK_BUS_DATA.routes.filter((route) => map.hasLayer(routeLayerGroups[route.id]));
    }

    function buildBusStopEntries(routes = CUHK_BUS_DATA.routes) {
      const entries = new Map();
      routes.forEach((route) => {
        route.stops.forEach((id, stopIndex) => {
          const stop = CUHK_BUS_DATA.stops[id];
          if (!stop || stop.kind === "waypoint") return;
          if (!entries.has(id)) {
            entries.set(id, {
              id,
              stop,
              coord: stop.coord,
              occurrences: [],
            });
          }
          entries.get(id).occurrences.push({
            route,
            stopIndex,
            direction: CUHK_BUS_UTILS.routeStopDirectionLabel(route, stopIndex),
          });
        });
      });
      return [...entries.values()].sort((a, b) => a.stop.name.localeCompare(b.stop.name, "zh-Hant"));
    }

    function allBusStopEntries() {
      if (!allBusStopEntriesCache) {
        allBusStopEntriesCache = buildBusStopEntries(CUHK_BUS_DATA.routes);
      }
      return allBusStopEntriesCache;
    }

    function allBusStopEntryById(id) {
      return allBusStopEntries().find((entry) => entry.id === id) || null;
    }

    function fullBusStopEntry(entry) {
      return allBusStopEntryById(entry.id) || entry;
    }

    function addBusStops(routes = CUHK_BUS_DATA.routes) {
      buildBusStopEntries(routes).forEach((entry) => {
        busStopDisplayMarkers(entry).forEach((display) => {
          const marker = L.marker([display.coord[1], display.coord[0]], {
            icon: L.divIcon({
              className: "",
              html: `<div class="bus-stop-marker"><span>站</span></div>`,
              iconSize: [22, 22],
              iconAnchor: [11, 11],
            }),
            zIndexOffset: 640,
          }).addTo(busStopsLayer);
          marker.bindPopup(() => busStopPopupHtml(entry));
          marker.on("popupopen", () => marker.setPopupContent(busStopPopupHtml(entry)));
          busStopPopupRefs.push({ marker, entry });

          const directionGlyph = CUHK_BUS_UTILS.stopDirectionGlyph(display.occurrences);
          if (directionGlyph) {
            L.marker([display.coord[1], display.coord[0]], {
              interactive: false,
              icon: L.divIcon({
                className: "",
                html: `<div class="bus-stop-direction-marker" style="--route-color:${stopDirectionColor(display)}">${escapeHtml(directionGlyph)}</div>`,
                iconSize: [22, 16],
                iconAnchor: [-8, 14],
              }),
              zIndexOffset: 620,
            }).addTo(busStopsLayer);
          }
        });
      });
    }

    function busStopDisplayMarkers(entry) {
      return [{ entry, occurrences: entry.occurrences, direction: "", coord: entry.coord }];
    }

    function stopDirectionColor(display) {
      const directionalItems = display.occurrences.filter((item) => item.direction === "上行" || item.direction === "下行");
      const directions = new Set(directionalItems.map((item) => item.direction));
      return directions.size === 1 && directionalItems[0] ? directionalItems[0].route.color : "#26332f";
    }

    function busStopPopupHtml(entry) {
      const popupEntry = fullBusStopEntry(entry);
      const routeMap = new Map();
      popupEntry.occurrences.forEach((item) => {
        if (!routeMap.has(item.route.id)) {
          routeMap.set(item.route.id, {
            route: item.route,
            directions: new Set(),
          });
        }
        if (item.direction) routeMap.get(item.route.id).directions.add(item.direction);
      });
      const stopDirection = CUHK_BUS_UTILS.stopDirectionSummary(popupEntry.occurrences);
      const stopDirectionLine = stopDirection === "按线路方向"
        ? ""
        : `<div>站点方向：${escapeHtml(stopDirection)}</div>`;
      const scheduledArrivals = CUHK_BUS_UTILS.nextStopArrivals(popupEntry.occurrences)
        .filter((arrival) => arrival.status === "scheduled");
      const routeRows = scheduledArrivals
        .map((arrival) => {
          const route = arrival.route;
          const directions = routeMap.get(route.id)?.directions || new Set();
          const directionText = arrival.direction
            ? ` · ${arrival.direction}`
            : (directions.size ? ` · ${[...directions].join(" / ")}` : "");
          const vehicles = CUHK_BUS_UTILS.activeVehicles(route).length;
          const vehicleText = vehicles ? ` · 当前估算 ${vehicles.toLocaleString("zh-CN")} 辆` : "";
          const arrivalText = CUHK_BUS_UTILS.stopArrivalSummary(arrival);
          return `
            <div><strong>校巴 ${escapeHtml(route.id)}</strong> ${escapeHtml(route.name)}${escapeHtml(directionText)}${escapeHtml(vehicleText)}</div>
            <div>${escapeHtml(arrivalText)}</div>
            <div>${escapeHtml(route.service)} · ${escapeHtml(CUHK_BUS_UTILS.scheduleSummary(route))}</div>
          `;
        })
        .join("");
      const emptyLine = scheduledArrivals.length ? "" : "<div>当前没有预计会经过本站的班次</div>";
      return `
        <strong>${escapeHtml(popupEntry.stop.name)}</strong>
        <div>校巴站点</div>
        ${stopDirectionLine}
        <div>预计经过：${scheduledArrivals.length.toLocaleString("zh-CN")} 条线路</div>
        ${emptyLine}
        ${routeRows}
      `;
    }

    function renderGpsRouteOptions() {
      gpsRoute.innerHTML = [
        "<option value=\"\">未选择</option>",
        ...CUHK_BUS_DATA.routes.map((route) => `
          <option value="${escapeHtml(route.id)}">${escapeHtml(busVehicleLabel(route))} · ${escapeHtml(route.name)}</option>
        `)
      ].join("");
    }

    function handleGpsRouteChange() {
      const route = gpsSelectedRoute();
      const direction = route ? CUHK_BUS_UTILS.routeDirectionLabel(route) : "";
      gpsDirection.value = direction || "";
      updateBoardStopOptions();
      updateGpsUi();
    }

    function gpsSelectedRoute() {
      return CUHK_BUS_DATA.routes.find((route) => route.id === gpsRoute.value) || null;
    }

    function gpsCollectionContext() {
      const route = gpsSelectedRoute();
      return {
        routeId: route ? route.id : null,
        routeName: route ? route.name : null,
        routeService: route ? route.service : null,
        direction: gpsDirection.value || (route ? CUHK_BUS_UTILS.routeDirectionLabel(route) || null : null),
        note: gpsNote.value.trim() || null
      };
    }

    function updateBoardStopOptions() {
      const route = gpsSelectedRoute();
      if (!route) {
        gpsBoardStop.innerHTML = "<option value=\"\">先选线路</option>";
        return;
      }
      const options = routeStopOptions(route);
      gpsBoardStop.innerHTML = [
        "<option value=\"\">选择上车站</option>",
        ...options.map((item) => `
          <option value="${escapeHtml(item.value)}">${escapeHtml(item.label)}</option>
        `)
      ].join("");
    }

    function routeStopOptions(route) {
      return (route.stops || [])
        .map((stopId, stopIndex) => {
          const stop = CUHK_BUS_DATA.stops[stopId];
          if (!stop || stop.kind === "waypoint") return null;
          const direction = CUHK_BUS_UTILS.routeStopDirectionLabel(route, stopIndex);
          return {
            value: `${stopId}:${stopIndex}`,
            stop,
            stopId,
            stopIndex,
            label: direction ? `${stop.name} · ${direction}` : stop.name
          };
        })
        .filter(Boolean);
    }

    function selectedBoardStop() {
      const route = gpsSelectedRoute();
      if (!route || !gpsBoardStop.value) return null;
      const [stopId, stopIndexText] = gpsBoardStop.value.split(":");
      const stopIndex = Number(stopIndexText);
      const stop = CUHK_BUS_DATA.stops[stopId];
      if (!stop || !Number.isInteger(stopIndex)) return null;
      return { route, stop, stopId, stopIndex };
    }

    function recordPassengerBoardingReport() {
      const selection = selectedBoardStop();
      if (!selection) {
        updateGpsUi("先选上车站");
        return;
      }
      const context = gpsCollectionContext();
      const report = {
        id: `board-${Date.now()}-${passengerReports.length + 1}`,
        event: "board",
        routeId: selection.route.id,
        routeName: selection.route.name,
        routeService: selection.route.service,
        direction: context.direction || CUHK_BUS_UTILS.routeDirectionLabel(selection.route) || null,
        stopId: selection.stopId,
        stopName: selection.stop.name,
        stopIndex: selection.stopIndex,
        timestamp: new Date().toISOString(),
        note: context.note,
        source: "local_demo",
        ttlMinutes: PASSENGER_REPORT_TTL_MINUTES
      };
      passengerReports.unshift(report);
      prunePassengerReports();
      persistPassengerReports();
      if (!map.hasLayer(routeLayerGroups[selection.route.id])) {
        CUHK_BUS_DATA.routes.forEach((route) => {
          setRouteVisible(route, route.id === selection.route.id);
        });
        updateBusStops();
        updateBusVehicles();
        syncBusRouteDock();
      }
      renderPassengerReports();
      updateRouteMessagePanel(selection.route);
      updateGpsUi("已上报上车");
    }

    function loadStoredPassengerReports() {
      try {
        const raw = localStorage.getItem(PASSENGER_REPORTS_STORAGE_KEY);
        if (!raw) return [];
        const reports = JSON.parse(raw);
        return Array.isArray(reports) ? reports.filter((report) => report.routeId && report.stopId && report.timestamp) : [];
      } catch {
        return [];
      }
    }

    function persistPassengerReports() {
      try {
        localStorage.setItem(PASSENGER_REPORTS_STORAGE_KEY, JSON.stringify(passengerReports));
      } catch {
        updateGpsUi("上报保存失败");
      }
    }

    function prunePassengerReports(now = new Date()) {
      const cutoff = now.getTime() - PASSENGER_REPORT_TTL_MINUTES * 60 * 1000;
      passengerReports = passengerReports
        .filter((report) => Date.parse(report.timestamp) >= cutoff)
        .sort((a, b) => Date.parse(b.timestamp) - Date.parse(a.timestamp));
    }

    function toggleGpsCollection() {
      if (gpsWatchId !== null) {
        stopGpsCollection("已停止");
      } else {
        startGpsCollection();
      }
    }

    function startGpsCollection() {
      if (!navigator.geolocation) {
        updateGpsUi("此浏览器不支持 GPS");
        return;
      }
      if (!window.isSecureContext && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
        updateGpsUi("需要 HTTPS");
        return;
      }
      updateGpsUi("请求定位");
      gpsCollector.classList.add("is-recording");
      gpsToggle.textContent = "停止";
      gpsWatchId = navigator.geolocation.watchPosition(
        handleGpsPosition,
        handleGpsError,
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 15000
        }
      );
      updateGpsUi("采集中");
    }

    function stopGpsCollection(status = "已停止") {
      if (gpsWatchId !== null) {
        navigator.geolocation.clearWatch(gpsWatchId);
        gpsWatchId = null;
      }
      gpsCollector.classList.remove("is-recording");
      gpsToggle.textContent = "开始";
      updateGpsUi(status);
    }

    function handleGpsPosition(position) {
      const point = gpsPointFromPosition(position);
      gpsCurrentPoint = point;
      const shouldStore = shouldStoreGpsPoint(point);
      if (shouldStore) {
        gpsPoints.push(point);
        persistGpsPoints();
      }
      renderGpsLayer(point);
      if (!gpsCentered) {
        map.setView([point.lat, point.lon], Math.max(map.getZoom(), 17));
        gpsCentered = true;
      }
      updateGpsUi(shouldStore ? "采集中" : "定位中");
    }

    function handleGpsError(error) {
      const messages = {
        1: "未授权定位",
        2: "无法定位",
        3: "定位超时"
      };
      stopGpsCollection(messages[error.code] || "定位失败");
    }

    function gpsPointFromPosition(position) {
      const coords = position.coords;
      const context = gpsCollectionContext();
      return {
        lon: coords.longitude,
        lat: coords.latitude,
        accuracy: coords.accuracy,
        altitude: Number.isFinite(coords.altitude) ? coords.altitude : null,
        altitudeAccuracy: Number.isFinite(coords.altitudeAccuracy) ? coords.altitudeAccuracy : null,
        heading: Number.isFinite(coords.heading) ? coords.heading : null,
        speed: Number.isFinite(coords.speed) ? coords.speed : null,
        timestamp: new Date(position.timestamp).toISOString(),
        routeId: context.routeId,
        routeName: context.routeName,
        routeService: context.routeService,
        direction: context.direction
      };
    }

    function shouldStoreGpsPoint(point) {
      const last = gpsPoints[gpsPoints.length - 1];
      if (!last) return true;
      const seconds = (Date.parse(point.timestamp) - Date.parse(last.timestamp)) / 1000;
      const meters = gpsDistanceMeters(last, point);
      return seconds >= 2 || meters >= 1.5;
    }

    function gpsDistanceMeters(a, b) {
      const radius = 6371000;
      const toRad = (value) => value * Math.PI / 180;
      const dLat = toRad(b.lat - a.lat);
      const dLon = toRad(b.lon - a.lon);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return 2 * radius * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
    }

    function recordGpsEvent(eventType) {
      const point = gpsCurrentPoint;
      if (!point) {
        updateGpsUi("等待定位");
        return;
      }
      const context = gpsCollectionContext();
      const nearest = nearestBusStop(point);
      const eventLabel = eventType === "depart" ? "离站" : "到站";
      gpsEvents.push({
        id: `gps-event-${Date.now()}-${gpsEvents.length + 1}`,
        event: eventType,
        eventLabel,
        lon: point.lon,
        lat: point.lat,
        accuracy: point.accuracy,
        timestamp: new Date().toISOString(),
        sourcePointTimestamp: point.timestamp,
        routeId: context.routeId,
        routeName: context.routeName,
        routeService: context.routeService,
        direction: context.direction,
        stopId: nearest ? nearest.id : null,
        stopName: nearest ? nearest.stop.name : null,
        stopDistanceMeters: nearest ? Math.round(nearest.distanceMeters) : null,
        note: context.note
      });
      persistGpsEvents();
      renderGpsLayer(point);
      updateGpsUi(`已记录${eventLabel}`);
    }

    function nearestBusStop(point) {
      let nearest = null;
      allBusStopEntries().forEach((entry) => {
        const distanceMeters = gpsDistanceMeters(point, {
          lon: entry.coord[0],
          lat: entry.coord[1]
        });
        if (!nearest || distanceMeters < nearest.distanceMeters) {
          nearest = { ...entry, distanceMeters };
        }
      });
      return nearest;
    }

    function renderGpsLayer(livePoint = null) {
      gpsLayer.clearLayers();
      gpsLiveMarker = null;
      gpsAccuracyCircle = null;
      gpsTrackLine = null;
      if (gpsPoints.length >= 2) {
        gpsTrackLine = L.polyline(gpsPoints.map((point) => [point.lat, point.lon]), {
          color: "#19704e",
          weight: 4,
          opacity: 0.8,
          lineCap: "round",
          lineJoin: "round"
        }).addTo(gpsLayer);
      }
      gpsPoints.forEach((point, index) => {
        L.marker([point.lat, point.lon], {
          interactive: false,
          icon: L.divIcon({
            className: "",
            html: "<span class=\"gps-sample-marker\"></span>",
            iconSize: [9, 9],
            iconAnchor: [4.5, 4.5]
          }),
          zIndexOffset: 760 + index
        }).addTo(gpsLayer);
      });
      gpsEvents.forEach((event, index) => {
        const eventClass = event.event === "depart" ? "depart" : "arrive";
        L.marker([event.lat, event.lon], {
          icon: L.divIcon({
            className: "",
            html: `<span class="gps-event-marker gps-event-${eventClass}">${event.event === "depart" ? "离" : "到"}</span>`,
            iconSize: [22, 22],
            iconAnchor: [11, 11]
          }),
          zIndexOffset: 860 + index
        })
          .bindPopup(gpsEventPopupHtml(event))
          .addTo(gpsLayer);
      });
      const current = livePoint || gpsPoints[gpsPoints.length - 1];
      if (current) {
        gpsAccuracyCircle = L.circle([current.lat, current.lon], {
          radius: current.accuracy || 0,
          color: "#19704e",
          fillColor: "#19704e",
          fillOpacity: 0.08,
          opacity: 0.32,
          weight: 1
        }).addTo(gpsLayer);
        gpsLiveMarker = L.marker([current.lat, current.lon], {
          icon: L.divIcon({
            className: "",
            html: "<span class=\"gps-live-marker\"></span>",
            iconSize: [18, 18],
            iconAnchor: [9, 9]
          }),
          zIndexOffset: 980
        }).addTo(gpsLayer);
      }
    }

    function gpsEventPopupHtml(event) {
      const routeText = event.routeId
        ? `校巴 ${event.routeId}${event.routeName ? ` · ${event.routeName}` : ""}`
        : "未选择线路";
      const stopText = event.stopName
        ? `${event.stopName}${Number.isFinite(event.stopDistanceMeters) ? ` · ${event.stopDistanceMeters}m` : ""}`
        : "未匹配站点";
      return `
        <strong>${escapeHtml(event.eventLabel || "GPS事件")}</strong>
        <div>${escapeHtml(routeText)}</div>
        <div>方向：${escapeHtml(event.direction || "未标注")}</div>
        <div>最近站点：${escapeHtml(stopText)}</div>
        <div>时间：${escapeHtml(new Date(event.timestamp).toLocaleString("zh-CN", { hour12: false }))}</div>
        ${event.note ? `<div>备注：${escapeHtml(event.note)}</div>` : ""}
      `;
    }

    function updateGpsUi(status) {
      const latest = gpsCurrentPoint || gpsPoints[gpsPoints.length - 1];
      gpsStatus.textContent = status || (gpsWatchId !== null ? "采集中" : "未开始");
      gpsPointCount.textContent = `${gpsPoints.length.toLocaleString("zh-CN")} 点`;
      gpsEventCount.textContent = `${gpsEvents.length.toLocaleString("zh-CN")} 记`;
      gpsAccuracy.textContent = latest && Number.isFinite(latest.accuracy)
        ? `精度 ${Math.round(latest.accuracy).toLocaleString("zh-CN")}m`
        : "精度 --";
      gpsUpdated.textContent = latest
        ? new Date(latest.timestamp).toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", second: "2-digit" })
        : "--:--";
      gpsExport.disabled = gpsPoints.length === 0 && gpsEvents.length === 0;
      gpsClear.disabled = gpsPoints.length === 0 && gpsEvents.length === 0;
      gpsBoard.disabled = !selectedBoardStop();
      gpsArrive.disabled = !gpsCurrentPoint;
      gpsDepart.disabled = !gpsCurrentPoint;
    }

    function loadStoredGpsPoints() {
      try {
        const raw = localStorage.getItem(GPS_STORAGE_KEY);
        if (!raw) return [];
        const points = JSON.parse(raw);
        return Array.isArray(points)
          ? points.filter((point) => Number.isFinite(point.lat) && Number.isFinite(point.lon))
          : [];
      } catch {
        return [];
      }
    }

    function loadStoredGpsEvents() {
      try {
        const raw = localStorage.getItem(GPS_EVENTS_STORAGE_KEY);
        if (!raw) return [];
        const events = JSON.parse(raw);
        return Array.isArray(events)
          ? events.filter((event) => Number.isFinite(event.lat) && Number.isFinite(event.lon) && event.event)
          : [];
      } catch {
        return [];
      }
    }

    function persistGpsPoints() {
      try {
        localStorage.setItem(GPS_STORAGE_KEY, JSON.stringify(gpsPoints));
      } catch {
        updateGpsUi("本地保存失败");
      }
    }

    function persistGpsEvents() {
      try {
        localStorage.setItem(GPS_EVENTS_STORAGE_KEY, JSON.stringify(gpsEvents));
      } catch {
        updateGpsUi("事件保存失败");
      }
    }

    function gpsGeoJson() {
      const features = gpsPoints.map((point, index) => ({
        type: "Feature",
        properties: {
          type: "gps_sample",
          sequence: index + 1,
          timestamp: point.timestamp,
          accuracy: point.accuracy,
          altitude: point.altitude,
          altitudeAccuracy: point.altitudeAccuracy,
          heading: point.heading,
          speed: point.speed,
          routeId: point.routeId || null,
          routeName: point.routeName || null,
          routeService: point.routeService || null,
          direction: point.direction || null
        },
        geometry: {
          type: "Point",
          coordinates: [point.lon, point.lat]
        }
      }));
      gpsEvents.forEach((event, index) => {
        features.push({
          type: "Feature",
          properties: {
            type: "gps_event",
            sequence: index + 1,
            event: event.event,
            eventLabel: event.eventLabel,
            timestamp: event.timestamp,
            sourcePointTimestamp: event.sourcePointTimestamp,
            accuracy: event.accuracy,
            routeId: event.routeId,
            routeName: event.routeName,
            routeService: event.routeService,
            direction: event.direction,
            stopId: event.stopId,
            stopName: event.stopName,
            stopDistanceMeters: event.stopDistanceMeters,
            note: event.note
          },
          geometry: {
            type: "Point",
            coordinates: [event.lon, event.lat]
          }
        });
      });
      if (gpsPoints.length >= 2) {
        const routeIds = [...new Set(gpsPoints.map((point) => point.routeId).filter(Boolean))];
        const directions = [...new Set(gpsPoints.map((point) => point.direction).filter(Boolean))];
        features.unshift({
          type: "Feature",
          properties: {
            type: "gps_track",
            pointCount: gpsPoints.length,
            eventCount: gpsEvents.length,
            routeIds,
            directions,
            startedAt: gpsPoints[0].timestamp,
            endedAt: gpsPoints[gpsPoints.length - 1].timestamp
          },
          geometry: {
            type: "LineString",
            coordinates: gpsPoints.map((point) => [point.lon, point.lat])
          }
        });
      }
      return {
        type: "FeatureCollection",
        name: "cuhk_gps_collection",
        metadata: {
          source: "Browser Geolocation API",
          app: "cuhk-map",
          schema: "gps_samples_track_events_v2",
          pointCount: gpsPoints.length,
          eventCount: gpsEvents.length,
          exportedAt: new Date().toISOString()
        },
        features
      };
    }

    function exportGpsGeoJson() {
      if (!gpsPoints.length && !gpsEvents.length) return;
      const blob = new Blob([JSON.stringify(gpsGeoJson(), null, 2)], { type: "application/geo+json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `cuhk-gps-${new Date().toISOString().replace(/[:.]/g, "-")}.geojson`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      updateGpsUi("已导出");
    }

    function clearGpsSamples() {
      if ((gpsPoints.length || gpsEvents.length) && !window.confirm("清空已采集的 GPS 点和事件？")) return;
      gpsPoints = [];
      gpsEvents = [];
      gpsCurrentPoint = null;
      gpsCentered = false;
      localStorage.removeItem(GPS_STORAGE_KEY);
      localStorage.removeItem(GPS_EVENTS_STORAGE_KEY);
      renderGpsLayer();
      updateGpsUi(gpsWatchId !== null ? "采集中" : "已清空");
    }

    function visibleRouteForMessages(explicitRoute = null) {
      if (explicitRoute) return explicitRoute;
      const routes = visibleBusRoutes();
      return routes.length === 1 ? routes[0] : null;
    }

    function reportsForRoute(route, now = new Date()) {
      prunePassengerReports(now);
      return passengerReports.filter((report) => report.routeId === route.id);
    }

    function renderPassengerReports() {
      passengerReportLayer.clearLayers();
      prunePassengerReports();
      persistPassengerReports();
      const visibleRouteIds = new Set(visibleBusRoutes().map((route) => route.id));
      passengerReports.forEach((report) => {
        if (!visibleRouteIds.has(report.routeId)) return;
        const estimate = estimatePassengerReportPosition(report);
        if (!estimate) return;
        L.marker([estimate.coord[1], estimate.coord[0]], {
          icon: L.divIcon({
            className: "",
            html: `<div class="passenger-report-marker" style="background:${estimate.route.color}">${escapeHtml(busVehicleLabel(estimate.route))}</div>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          }),
          zIndexOffset: 920
        })
          .bindPopup(passengerReportPopupHtml(report, estimate))
          .addTo(passengerReportLayer);
      });
    }

    function estimatePassengerReportPosition(report, at = new Date()) {
      const route = CUHK_BUS_DATA.routes.find((item) => item.id === report.routeId);
      if (!route || !Number.isInteger(report.stopIndex)) return null;
      const coords = CUHK_BUS_UTILS.routeCoordinates(route);
      if (coords.length < 2) return null;
      const tripMinutes = route.schedule && route.schedule.estimatedTripMinutes || 15;
      const elapsedMinutes = Math.max(0, (at.getTime() - Date.parse(report.timestamp)) / 60000);
      const startProgress = CUHK_BUS_UTILS.routeStopProgress(route, report.stopIndex);
      const progress = Math.max(0, Math.min(1, startProgress + elapsedMinutes / tripMinutes));
      const point = CUHK_BUS_UTILS.coordAtProgress(coords, progress);
      return {
        route,
        coord: point.coord,
        bearing: point.bearing,
        elapsedMinutes,
        progress,
        nextStop: nextStopForProgress(route, progress)
      };
    }

    function nextStopForProgress(route, progress) {
      const stops = routeStopOptions(route);
      return stops.find((item) => CUHK_BUS_UTILS.routeStopProgress(route, item.stopIndex) > progress + 0.005) || null;
    }

    function passengerReportPopupHtml(report, estimate) {
      const nextText = estimate.nextStop ? `估计前往：${estimate.nextStop.stop.name}` : "估计接近线路终点";
      return `
        <strong>乘客上报 · 校巴 ${escapeHtml(report.routeId)}</strong>
        <div>${escapeHtml(report.stopName)} 上车 · ${escapeHtml(reportRelativeTime(report.timestamp))}</div>
        <div>${escapeHtml(nextText)}</div>
        <div>${escapeHtml(report.routeName || "")}${report.direction ? ` · ${escapeHtml(report.direction)}` : ""}</div>
        ${report.note ? `<div>备注：${escapeHtml(report.note)}</div>` : ""}
        <div>本地演示数据，接入小程序云数据库后可共享给所有人。</div>
      `;
    }

    function updateRouteMessagePanel(explicitRoute = null) {
      const route = visibleRouteForMessages(explicitRoute);
      if (!route) {
        routeMessagePanel.hidden = true;
        return;
      }
      const reports = reportsForRoute(route).slice(0, 4);
      routeMessageTitle.textContent = `校巴 ${route.id} · ${route.name}`;
      routeMessageBody.innerHTML = reports.length
        ? reports.map((report) => {
          const estimate = estimatePassengerReportPosition(report);
          const nextText = estimate && estimate.nextStop ? `估计前往 ${estimate.nextStop.stop.name}` : "估计接近线路终点";
          return `
            <div class="route-report-row">
              <span>${escapeHtml(report.stopName)} 上车 · ${escapeHtml(reportRelativeTime(report.timestamp))}</span>
              <small>${escapeHtml(nextText)}${report.note ? ` · ${escapeHtml(report.note)}` : ""}</small>
            </div>
          `;
        }).join("")
        : "<div class=\"route-report-empty\">暂无乘客上报。接入微信小程序后，这里显示最新上车站和估计位置。</div>";
      routeMessagePanel.hidden = false;
    }

    function routeReportsHtml(route) {
      const reports = reportsForRoute(route).slice(0, 3);
      if (!reports.length) return "<div>乘客上报：暂无</div>";
      return `
        <div>乘客上报：</div>
        ${reports.map((report) => {
          const estimate = estimatePassengerReportPosition(report);
          const nextText = estimate && estimate.nextStop ? `，估计前往 ${estimate.nextStop.stop.name}` : "";
          return `<div>${escapeHtml(report.stopName)} 上车 · ${escapeHtml(reportRelativeTime(report.timestamp))}${escapeHtml(nextText)}</div>`;
        }).join("")}
      `;
    }

    function reportRelativeTime(timestamp, now = new Date()) {
      const seconds = Math.max(0, Math.floor((now.getTime() - Date.parse(timestamp)) / 1000));
      if (seconds < 60) return "刚刚";
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}分钟前`;
      const hours = Math.floor(minutes / 60);
      return `${hours}小时前`;
    }

    function addBusRoute(route, layer) {
      const latLngs = routeLatLngs(route);
      if (latLngs.length < 2) return;
      const routeDirection = CUHK_BUS_UTILS.routeDirectionLabel(route) || "按线路方向";

      const line = L.polyline(latLngs, {
        color: route.color,
        weight: 4,
        opacity: 0.86,
        lineCap: "round",
        lineJoin: "round"
      }).addTo(layer);

      line.bindPopup(() => `
        <strong>校巴 ${escapeHtml(route.id)} · ${escapeHtml(route.name)}</strong>
        <div>${escapeHtml(route.service)}</div>
        <div>方向：${escapeHtml(routeDirection)}</div>
        <div>时刻：${escapeHtml(CUHK_BUS_UTILS.scheduleSummary(route))}</div>
        <div>估算运行：${escapeHtml(String(route.schedule && route.schedule.estimatedTripMinutes || "未知"))} 分钟</div>
        <div><a href="${escapeHtml(CUHK_BUS_UTILS.scheduleSourceUrl(route))}" target="_blank" rel="noopener">官方时刻表</a></div>
        ${routeReportsHtml(route)}
        <div>${routeStopNames(route).map(escapeHtml).join(" → ")}</div>
      `);

      const labelIndex = Math.floor((latLngs.length - 1) / 2);
      L.marker(latLngs[labelIndex], {
        interactive: false,
        icon: L.divIcon({
          className: "",
          html: `<div class="bus-route-label" style="--route-color:${route.color}">${escapeHtml(route.id)}</div>`,
          iconSize: [42, 22],
          iconAnchor: [21, 11]
        })
      }).addTo(layer);

    }

    function updateBusVehicles() {
      CUHK_BUS_DATA.routes.forEach((route) => {
        const vehicleLayer = routeVehicleLayers[route.id];
        if (!vehicleLayer) return;
        vehicleLayer.clearLayers();
        if (!map.hasLayer(routeLayerGroups[route.id])) return;
        CUHK_BUS_UTILS.activeVehicles(route).forEach((vehicle) => {
          const vehicleLabel = busVehicleLabel(route);
          const marker = L.marker([vehicle.coord[1], vehicle.coord[0]], {
            icon: L.divIcon({
              className: "",
              html: `<div class="bus-vehicle-marker" style="--route-color:${route.color}; --vehicle-bearing:${vehicle.bearing - 90}deg; --label-bearing:${90 - vehicle.bearing}deg"><span class="bus-vehicle-label">${escapeHtml(vehicleLabel)}</span></div>`,
              iconSize: [38, 22],
              iconAnchor: [19, 11],
            }),
            zIndexOffset: 900,
          }).addTo(vehicleLayer);
          marker.bindPopup(`
            <strong>估算小车 · 校巴 ${escapeHtml(route.id)}</strong>
            <div>发车：${escapeHtml(CUHK_BUS_UTILS.formatTime(vehicle.departure))}</div>
            <div>已行驶：${Math.floor(vehicle.elapsedMinutes).toLocaleString("zh-CN")} / ${vehicle.tripMinutes.toLocaleString("zh-CN")} 分钟</div>
            <div>${escapeHtml(route.name)} · ${escapeHtml(route.service)}</div>
            <div>非实时 GPS，按官方时刻表和路线折线估算。</div>
          `);
        });
      });
      if (latestStats) updateStats(latestStats);
      busStopPopupRefs.forEach(({ marker, entry }) => {
        if (marker.isPopupOpen && marker.isPopupOpen()) {
          marker.setPopupContent(busStopPopupHtml(entry));
        }
      });
      renderPassengerReports();
      updateRouteMessagePanel();
    }

    function tagsOf(feature) {
      return (feature.properties && (feature.properties.tags || feature.properties)) || {};
    }

    function readableName(tags) {
      return tags.name || tags["name:zh"] || tags["name:en"] || tags.brand || tags.operator || "未命名地点";
    }

    function poiCategory(tags) {
      if (tags.poi_category && POI_CATEGORY_BY_ID[tags.poi_category]) {
        return POI_CATEGORY_BY_ID[tags.poi_category];
      }
      const amenity = String(tags.amenity || "").toLowerCase();
      const healthcare = String(tags.healthcare || "").toLowerCase();
      const building = String(tags.building || "").toLowerCase();
      const tourism = String(tags.tourism || "").toLowerCase();
      const manMade = String(tags.man_made || "").toLowerCase();
      const station = String(tags.station || "").toLowerCase();
      const shop = String(tags.shop || "").toLowerCase();
      const cuisine = String(tags.cuisine || "").toLowerCase();
      const text = [tags.name, tags["name:en"], tags["name:zh"], tags.brand, tags.operator, tags.cuisine, tags.shop]
        .filter(Boolean)
        .join(" ")
        .toLowerCase();
      if (
        ["hospital", "clinic", "doctors", "pharmacy"].includes(amenity) ||
        ["hospital", "clinic", "doctor", "doctors", "pharmacy"].includes(healthcare) ||
        building === "hospital"
      ) {
        return POI_CATEGORY_BY_ID.medical;
      }
      if (["hotel", "guest_house", "hostel"].includes(tourism)) return POI_CATEGORY_BY_ID.accommodation;
      if (amenity === "ferry_terminal" || manMade === "pier" || station === "ferry") return POI_CATEGORY_BY_ID.ferry;
      if (amenity === "fast_food" || shop === "bakery") return POI_CATEGORY_BY_ID.fast_food;
      if (["restaurant", "food_court", "canteen"].includes(amenity)) return POI_CATEGORY_BY_ID.restaurant;
      if (/bubble[_ -]?tea|milk[_ -]?tea|奶茶|茶飲|茶饮|喜茶|贡茶|貢茶/.test(text)) return POI_CATEGORY_BY_ID.milk_tea;
      if (amenity === "cafe" || cuisine === "coffee_shop" || /coffee|cafe|café|咖啡|starbucks|pacific coffee/.test(text)) {
        return POI_CATEGORY_BY_ID.coffee;
      }
      if (["coffee", "tea", "beverages"].includes(shop)) return POI_CATEGORY_BY_ID.other_drink;
      return null;
    }

    function isPoiTags(tags) {
      return Boolean(poiCategory(tags || {}));
    }

    function addPoi(feature, category) {
      if (!feature.geometry || feature.geometry.type !== "Point") return false;
      const tags = tagsOf(feature);
      const coords = feature.geometry.coordinates;
      const marker = L.marker([coords[1], coords[0]], {
        icon: L.divIcon({
          className: "",
          html: `<div class="poi-marker poi-${category.marker}" style="--poi-color:${category.color}"><span class="poi-marker-glyph">${escapeHtml(category.glyph)}</span></div>`,
          iconSize: [22, 22],
          iconAnchor: [11, 11]
        })
      });

      marker.bindPopup(`
        <strong>${escapeHtml(readableName(tags))}</strong>
        <div>${escapeHtml(category.label)}</div>
        ${tags.opening_hours ? `<div>营业时间：${escapeHtml(tags.opening_hours)}</div>` : ""}
      `);
      marker.addTo(poiLayerGroups[poiLayerGroupForCategory(category).id]);
      return true;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[ch]));
    }

    function sameCoordinate(a, b) {
      return a && b && a[0] === b[0] && a[1] === b[1];
    }

    function osmToGeojson(osm) {
      const nodes = new Map();
      const features = [];

      osm.elements.forEach((element) => {
        if (element.type === "node") {
          nodes.set(element.id, [element.lon, element.lat]);
        }
      });

      osm.elements.forEach((element) => {
        if (element.tags && element.center && isPoiTags(element.tags)) {
          features.push({
            type: "Feature",
            properties: { ...element.tags, osm_type: element.type, osm_id: element.id },
            geometry: { type: "Point", coordinates: [element.center.lon, element.center.lat] }
          });
          return;
        }

        if (element.type === "node" && element.tags) {
          features.push({
            type: "Feature",
            properties: { ...element.tags, osm_type: "node", osm_id: element.id },
            geometry: { type: "Point", coordinates: [element.lon, element.lat] }
          });
        }

        if (element.type === "way" && element.tags && Array.isArray(element.nodes)) {
          const coordinates = element.nodes.map((id) => nodes.get(id)).filter(Boolean);
          if (coordinates.length < 2) return;
          const closed = coordinates.length > 3 && sameCoordinate(coordinates[0], coordinates[coordinates.length - 1]);
          const geometry = closed && !element.tags.highway
            ? { type: "Polygon", coordinates: [coordinates] }
            : { type: "LineString", coordinates };
          features.push({
            type: "Feature",
            properties: { ...element.tags, osm_type: "way", osm_id: element.id },
            geometry
          });
        }
      });

      return { type: "FeatureCollection", features };
    }

    function updateStats(stats) {
      latestStats = stats;
      const busStops = Object.values(CUHK_BUS_DATA.stops).filter((stop) => stop.kind !== "waypoint");
      const busOsmStops = busStops.filter((stop) => stop.osmId).length;
      const clock = CUHK_BUS_UTILS.hongKongClock();
      const visibleRoutes = CUHK_BUS_DATA.routes.filter((route) => map.hasLayer(routeLayerGroups[route.id]));
      const activeCount = visibleRoutes.flatMap((route) => CUHK_BUS_UTILS.activeVehicles(route)).length;
      const categoryRows = POI_LAYER_GROUPS
        .filter((group) => poiLayerGroupCount(group, stats) > 0)
        .map((group) => `
          <div class="row"><span>${escapeHtml(group.label)}</span><span>${poiLayerGroupCount(group, stats).toLocaleString("zh-CN")} 个</span></div>
        `)
        .join("");
      document.getElementById("count").textContent = `${stats.features.toLocaleString("zh-CN")} 个要素 · ${stats.poi.toLocaleString("zh-CN")} 个 POI · ${CUHK_BUS_DATA.routes.length} 条校巴`;
      document.getElementById("stats").innerHTML = `
        ${categoryRows}
        <div class="row"><span>校巴</span><span>${CUHK_BUS_DATA.routes.length} 条线路 · ${busStops.length} 个站点（${busOsmStops} 个 OSM 节点）</span></div>
        <div class="row"><span>小车估算</span><span>香港时间 ${clock.label} · 已开启线路 ${activeCount.toLocaleString("zh-CN")} 辆</span></div>
        <div class="row"><span>数据源</span><span>OpenStreetMap / Overpass 实时读取</span></div>
      `;
    }

    window.setInterval(updateBusVehicles, 30000);
    updateBusVehicles();

    async function loadData() {
      const loading = document.getElementById("loading");
      const response = await fetch(OVERPASS_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
        body: "data=" + encodeURIComponent(OVERPASS_QUERY)
      });
      if (!response.ok) throw new Error(`Overpass 返回 ${response.status}`);
      const osm = await response.json();
      const geojson = osmToGeojson(osm);
      const stats = {
        features: geojson.features.length,
        poi: 0,
        poiCategories: Object.fromEntries(POI_CATEGORIES.map((category) => [category.id, 0]))
      };
      const fitBounds = L.latLngBounds([]);
      Object.values(CUHK_BUS_DATA.stops).forEach((stop) => {
        if (stop.kind !== "waypoint" && stop.coord) {
          fitBounds.extend([stop.coord[1], stop.coord[0]]);
        }
      });

      geojson.features.forEach((feature) => {
        const tags = tagsOf(feature);
        const category = poiCategory(tags);
        if (category && addPoi(feature, category)) {
          const coords = feature.geometry.coordinates;
          fitBounds.extend([coords[1], coords[0]]);
          stats.poiCategories[category.id] += 1;
          stats.poi += 1;
        }
      });

      if (fitBounds.isValid()) {
        map.fitBounds(fitBounds, { padding: [28, 28] });
      }
      updateStats(stats);
      loading.textContent = "加载完成。点击顶部校巴标志显示线路；右上角可显示或隐藏常用信息。";
      setTimeout(() => loading.remove(), 4200);
    }

    loadData().catch((error) => {
      const loading = document.getElementById("loading");
      loading.classList.add("error");
      loading.textContent = `加载失败：${error.message}`;
      document.getElementById("stats").innerHTML = "<div class='row'><span>状态</span><span>加载失败，请稍后刷新</span></div>";
    });
  </script>
</body>
</html>
